name: Snort Repository Validation

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Verify Repository Structure
        run: |
          test -f README.md
          test -f LICENSE
          test -f CHANGELOG.md
          test -f rules/custom.rules

      - name: Count Custom Rules
        run: |
          echo "Total alert rules:"
          grep -c "^alert" rules/custom.rules

      - name: Check for Duplicate SIDs
        run: |
          SIDS=$(grep -o 'sid:[0-9]*' rules/custom.rules | cut -d: -f2)
          DUP=$(echo "$SIDS" | sort | uniq -d)

          if [ -n "$DUP" ]; then
            echo "Duplicate SID(s) found:"
            echo "$DUP"
            exit 1
          fi

          echo "No duplicate SIDs found."

      - name: Verify Documentation
        run: |
          test -f docs/Installation.md
          test -f docs/Configuration.md
          test -f docs/Rule-Explanation.md
          test -f docs/Testing.md

      - name: Success
        run: echo "Repository validation completed successfully."